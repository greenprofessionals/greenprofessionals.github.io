// ============================= INTRO =============================
{
  section: "Introduction", sectionStart: true, theme: "light",
  kicker: "CHAPTER 11 · WEEK 11",
  title: "Automated Planning",
  sub: "How an intelligent agent decides what to do — and proves, before acting, that it will work.",
  body: `
    <div class="grid2">
      <div class="card amber">
        <h2>What this lecture covers</h2>
        <p>We move from an agent that just <em>searches</em> for a path, to an agent that <em>represents</em> its actions symbolically — so it can reason about thousands of possible plans without a human hand-coding a heuristic for every new problem.</p>
      </div>
      <div class="card green">
        <h2 class="g">Teaching goal</h2>
        <p>By the end of these two hours, you should be able to explain planning as three ideas working together: <b>representation</b> (PDDL), <b>search</b> (forward, backward, SAT), and <b>structure</b> (heuristics, hierarchy, scheduling).</p>
      </div>
    </div>
    <div class="callout">This deck has built-in presenter notes. Press <b>N</b> at any time to open a teleprompter-style script for the slide on screen, and use the section dropdown at top-right to jump anywhere in the chapter.</div>
  `,
  notes: `Good [morning/afternoon], everyone. Welcome back — today we're starting Chapter 11, Automated Planning. Over the last several weeks we've built up two very different toolkits for getting an agent to act intelligently: search, all the way back in Chapter 3, and logic, in Chapter 7. Today those two toolkits merge. Planning is what you get when you take the idea of search, but you stop treating a state as an opaque black box, and instead you write it down as a set of facts — and you write actions down as recipes that flip some facts on and some facts off. That one change is going to unlock everything else we do today: fast domain-independent heuristics, hierarchical plans that scale to real industrial problems, plans that work even when the agent can't fully see the world, and schedules that respect deadlines and shared resources. My goal for you today isn't just to memorize the notation — PDDL, RESULT, REACH, and so on — it's to walk out being able to say, in plain English, why each of these ideas exists and what real problem it solves. Let's get started.`
},
{
  section: "Introduction", theme: "light",
  kicker: "ROADMAP",
  title: "How This Lecture Unfolds",
  sub: "Seven sections, in the order the textbook presents them — each gets its own teaching space.",
  body: `
    <div class="grid3">
      <div class="card blue"><h2>11.1 — Defining Planning</h2><p>PDDL, states, actions, and three worked domains: Air Cargo, Spare Tire, Blocks World.</p></div>
      <div class="card blue"><h2>11.2 — Algorithms</h2><p>Forward search, backward search, and planning-as-satisfiability.</p></div>
      <div class="card blue"><h2>11.3 — Heuristics</h2><p>Relaxations, pruning, abstraction, and decomposition that tame huge state spaces.</p></div>
      <div class="card amber"><h2>11.4 — Hierarchy</h2><p>High-level actions, refinements, and angelic semantics for provably-correct abstract plans.</p></div>
      <div class="card amber"><h2>11.5 — Uncertainty</h2><p>Sensorless, contingent, and online planning when the world isn't fully known or predictable.</p></div>
      <div class="card amber"><h2>11.6 — Scheduling</h2><p>Adding time, durations, and shared resources — critical path method.</p></div>
    </div>

/* =====================================================================
   ENGINE
   ===================================================================== */
let current = 0;
const total = SLIDES.length;

function buildNav(){
  const sel = document.getElementById('sectionSelect');
  sel.innerHTML = '';
  SLIDES.forEach((s,i)=>{
    if(s.sectionStart){
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = s.section;
      sel.appendChild(opt);
    }
  });
}

function updateSectionSelectValue(){
  let idx = 0;
  for(let i=0;i<=current;i++){ if(SLIDES[i].sectionStart) idx=i; }
  document.getElementById('sectionSelect').value = idx;
}

function render(){
  const s = SLIDES[current];
  const themeClass = 'theme-' + (s.theme || 'dark');
  document.querySelector('.slide').className = 'slide ' + themeClass;

  document.getElementById('kicker').textContent = s.kicker || '';
  document.getElementById('kicker').style.display = s.kicker ? 'inline-block' : 'none';
  document.getElementById('title').textContent = s.title || '';
  const subEl = document.getElementById('sub');
  if(s.sub){ subEl.style.display='block'; subEl.textContent = s.sub; } else { subEl.style.display='none'; }
  document.getElementById('bodyEl').innerHTML = s.body || '';
  document.getElementById('notesText').innerHTML = s.notes || '<em>No notes for this slide.</em>';
  document.getElementById('counter').textContent = (current+1) + ' / ' + total;
  document.getElementById('progressFill').style.width = ((current+1)/total*100) + '%';
  updateSectionSelectValue();
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===total-1;
  document.getElementById('stage').scrollTop = 0;
}

function go(n){ current = Math.max(0, Math.min(total-1, n)); render(); }
function next(){ go(current+1); }
function prev(){ go(current-1); }

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('sectionSelect').addEventListener('change', e=>go(parseInt(e.target.value,10)));

function toggleNotes(force){
  const d = document.getElementById('notesDrawer');
  const willOpen = typeof force === 'boolean' ? force : !d.classList.contains('open');
  d.classList.toggle('open', willOpen);
  d.setAttribute('aria-hidden', String(!willOpen));
  document.getElementById('notesBtn').setAttribute('aria-pressed', String(willOpen));
}
document.getElementById('notesBtn').addEventListener('click', ()=>toggleNotes());
document.getElementById('closeNotesBtn').addEventListener('click', ()=>toggleNotes(false));

function toggleFullscreen(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
  else { document.exitFullscreen(); }
}
document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);

document.addEventListener('keydown', e=>{
  const tag = (e.target && e.target.tagName) || '';
  if(tag === 'SELECT' || tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key==='ArrowRight' || e.key===' ' || e.key==='PageDown'){ next(); e.preventDefault(); }
  else if(e.key==='ArrowLeft' || e.key==='PageUp'){ prev(); e.preventDefault(); }
  else if(e.key==='Home'){ go(0); }
  else if(e.key==='End'){ go(total-1); }
  else if(e.key.toLowerCase()==='n'){ toggleNotes(); }
  else if(e.key.toLowerCase()==='f'){ toggleFullscreen(); }
  else if(e.key==='Escape'){ toggleNotes(false); }
});

let touchStartX = 0;
document.getElementById('stage').addEventListener('touchstart', e=>{ touchStartX = e.changedTouches[0].screenX; }, {passive:true});
document.getElementById('stage').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].screenX - touchStartX;
  if(dx > 60) prev(); else if(dx < -60) next();
}, {passive:true});

buildNav();
render();
</script>
